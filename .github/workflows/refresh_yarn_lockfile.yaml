name: Refresh yarn lockfile

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: "0 3 * * 1"

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - name: Enable Corepack
        run: corepack enable

      - name: Verify Yarn version
        run: yarn --version

      - name: Remove yarn.lock
        run: rm -f yarn.lock

      - name: Install dependencies
        run: yarn install

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/refresh-yarn-lockfile
          delete-branch: true
          commit-message: "chore: regenerate yarn lockfile"
          title: "chore: regenerate yarn lockfile"
          body: |
            This PR was created automatically.

            Changes:
            - Removed yarn.lock
            - Re-ran yarn install
            - Updated package-lock.json
          labels: |
            dependencies
            automated
