name: Refresh yarn lockfile

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: "0 3 * * 1"

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - name: Enable Corepack
        run: corepack enable

      - name: Verify Yarn version
        run: yarn --version

      - name: Remove yarn.lock
        run: rm -f yarn.lock

      - name: Install dependencies to regenerate yarn.lock file
        run: yarn install

      - name: Create branch and commit changes
        run: |
          BRANCH="automation/refresh-yarn-lockfile"

          git checkout -b "$BRANCH"

          git config user.name openshift-pipelines-bot
          git config user.email pipelines-extcomm@redhat.com

          git add yarn.lock

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          
          git commit -m "chore: regenerate yarn.lock"

          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "automation/refresh-yarn-lockfile" \
            --title "chore: regenerate yarn.lock" \
            --body "$(cat <<'EOF'
          This PR was created automatically.

          Changes:
          - Removed yarn.lock
          - Re-ran yarn install
          - Regenerated yarn.lock
          EOF
          )" \
            --label "dependencies" \
            --label "automated"
